<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JajaninId</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">Jajanin<span>Id</span></a>
    <div class="nav-links">
      <a href="explore.html">🔍 Explore</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up ✨</a>
    </div>
  </nav>

  <!-- AUTHENTICATION PANELS -->
  <div class="auth-container">
    <div class="comic-card auth-box">
      <h1>Login 🔐</h1>
      <p class="subtitle">Masuk ke dashboard untuk kelola akun donasimu</p>
      
      <!-- Error Message Container (Fixed legacy JS crash issue) -->
      <div id="errorMsg" style="display:none; background:rgba(255, 94, 94, 0.08); color:var(--danger); border:1px solid rgba(255, 94, 94, 0.2); padding:12px 16px; border-radius:8px; font-family:var(--font-body); font-size:0.9rem; font-weight:600; margin-bottom:20px; text-align:center;"></div>

      <!-- Email Auth -->
      <div id="emailAuth" style="margin-bottom: 24px;">
        <div class="form-group">
          <label>Email Resmi</label>
          <input type="email" class="comic-input" id="loginEmail" placeholder="nama@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="comic-input" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-lg" style="width:100%; margin-top:12px;"
          onclick="loginWithEmail()">
          Masuk Sekarang 🚀
        </button>
      </div>

      <div class="auth-divider">atau masuk dengan akun Google</div>

      <!-- Google OAuth -->
      <button class="btn btn-secondary btn-lg" style="width:100%; gap:12px;"
        onclick="loginWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0;">
          <path fill="#ea4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285f4"
            d="M46.5 24c0-1.55-.15-3.24-.47-4.78H24v9.03h12.75c-.53 2.85-2.12 5.25-4.5 6.85l6.85 5.3c4-3.69 6.4-9.13 6.4-16.4z" />
          <path fill="#fbbc05"
            d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.98-6.19z" />
          <path fill="#34a853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-6.85-5.3c-2.51 1.69-5.71 2.61-9.04 2.61-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        </svg>
        Login dengan Google
      </button>

      <p class="auth-footer">Belum punya akun? <a href="register.html">Daftar di sini!</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Show error from URL params
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
      const errorMsg = document.getElementById('errorMsg');
      const messages = {
        'access_denied': 'Akses ditolak. Silakan coba lagi.',
        'no_code': 'Gagal mendapatkan kode otorisasi.',
        'token_failed': 'Gagal memverifikasi akun Google.',
        'userinfo_failed': 'Gagal mengambil info akun Google.',
      };
      errorMsg.textContent = messages[error] || 'Terjadi kesalahan.';
      errorMsg.style.display = 'block';
    }

    async function loginWithEmail() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Email dan password wajib diisi!';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/backend/auth.php?action=login_email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          showModal('Welcome! 🎉', `Login sebagai <strong>${data.user.name}</strong> (${data.user.role})`, 'success');
          setTimeout(() => { window.location.href = data.redirect; }, 1200);
        } else {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
        }
      } catch (e) {
        errorMsg.textContent = 'Server belum berjalan. Jalankan: php -S localhost:8000';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>

</html>
